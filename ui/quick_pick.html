    <!-- Quick Pick 視窗 -->
    <div id="quick-pick-modal" class="modal-overlay">
        <div class="modal-content" style="max-width: 400px; padding: 0; overflow: hidden;">
            <div class="modal-header" style="padding: 15px 20px; border-bottom: 1px solid #eee; margin-bottom: 0;">
                <span id="quick-pick-title">Select Option</span>
            </div>
            <div id="quick-pick-body" style="max-height: 300px; overflow-y: auto;">
                <div id="quick-pick-list" class="quick-pick-list">
                    <!-- 動態插入選項 -->
                </div>
            </div>
            <div class="modal-footer" style="padding: 10px 20px; border-top: 1px solid #eee; margin-top: 0;">
                <button class="btn-close" onclick="window.CocoyaUI.closeQuickPick(null)">%{BKY_MSG_CANCEL}</button>
            </div>
        </div>
    </div>
